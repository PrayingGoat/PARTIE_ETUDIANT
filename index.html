                    <div className="flex items-center justify-between"><div className="flex items-center gap-4"><button className="p-2 rounded-full border border-slate-200"><ChevronLeft size={20} /></button><div className="text-center"><h2 className="text-xl font-bold text-slate-800">Semaine du 27 Janvier 2026</h2><p className="text-sm text-slate-400 font-medium">Semaine 5 • Janvier 2026</p></div><button className="p-2 rounded-full border border-slate-200"><ChevronRight size={20} /></button></div><div className="flex items-center gap-3"><button className="px-4 py-2 border border-slate-200 rounded-lg text-sm font-bold flex items-center gap-2"><Calendar size={16}/> Mois</button><button className="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm font-bold flex items-center gap-2"><Download size={16}/> Exporter iCal</button></div></div>
                    <div className="flex flex-wrap items-center gap-2">
                        <button className="px-5 py-2 bg-blue-500 text-white rounded-lg text-sm font-bold">Tout</button>
                        <Tag label="Cours" color="blue" />
                        <Tag label="Entreprise" color="emerald" />
                        <Tag label="Examens" color="pink" />
                        <Tag label="RDV" color="indigo" />
                    </div>
                    <div className="overflow-x-auto border border-slate-50 rounded-2xl">
                        <table className="w-full border-collapse min-w-[1000px]">
                            <thead>
                                <tr className="bg-slate-50/30">
                                    <th className="p-4 text-center text-[10px] font-bold text-slate-400 border-b border-r border-slate-100 uppercase tracking-widest w-24">Horaire</th>
                                    <DayHeader day="Lun. 27" month="Janvier" />
                                    <DayHeader day="Mar. 28" month="Janvier" />
                                    <DayHeader day="Mer. 29" month="Janvier" />
                                    <DayHeader day="Jeu. 30" month="Janvier" />
                                    <DayHeader day="Ven. 31" month="Janvier" />
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td className="p-4 text-center border-r border-b border-slate-100 text-sm font-bold text-slate-400">9h00 - 12h00</td>
                                    <td className="p-2 border-r border-b border-slate-100"><PlanningCard color="bg-blue-500" title="Négociation" time="9h00 - 12h00" loc="Salle 201" /></td>
                                    <td className="p-2 border-r border-b border-slate-100"><PlanningCard color="bg-purple-500" title="Anglais" time="9h00 - 11h00" loc="Salle 105" /></td>
                                    <td rowSpan={2} className="p-2 border-r border-b border-slate-100 align-top"><PlanningCard color="bg-emerald-500" striped title="Entreprise" time="Journée complète" isFull /></td>
                                    <td className="p-2 border-r border-b border-slate-100"><PlanningCard color="bg-emerald-500" title="Entreprise" time="" isSmall /></td>
                                    <td className="p-2 border-b border-slate-100"><PlanningCard color="bg-orange-500" title="GRC client" time="9h00 - 12h00" /></td>
                                </tr>
                                <tr>
                                    <td className="p-4 text-center border-r border-slate-100 text-sm font-bold text-slate-400">14h00 - 17h00</td>
                                    <td className="p-2 border-r border-slate-100"><PlanningCard color="bg-pink-500" title="Marketing" time="14h00 - 17h00" /></td>
                                    <td className="p-2 border-r border-slate-100"><PlanningCard color="bg-indigo-500" title="Culture gén." time="14h00 - 16h00" /></td>
                                    <td className="p-2 border-r border-slate-100"><PlanningCard color="bg-orange-500" title="Point pédago." time="14h00" isSmall /></td>
                                    <td className="p-2"><PlanningCard color="bg-teal-500" title="Projet prof." time="14h00 - 17h00" /></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );

        /* --- SUB COMPONENTS --- */

        const NavTab = ({ label, icon, active, onClick }) => (
            <button onClick={onClick} className={`flex items-center gap-2 px-6 py-2.5 rounded-lg text-sm font-bold transition-all whitespace-nowrap ${active ? 'bg-blue-500 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50' }`}>
                {icon} {label}
            </button>
        );

        const SimpleStatCard = ({ title, subtitle, extra, color }) => (
            <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm text-center flex flex-col items-center justify-center">
                <div className={`text-2xl font-bold mb-1 ${color}`}>{title}</div>
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">{subtitle}</div>
                <div className="text-[10px] font-bold text-slate-400 opacity-60 uppercase tracking-tighter">{extra}</div>
            </div>
        );

        const CompetenceItem = ({ label, value, progress, color }) => (
            <div className="space-y-2">
                <div className="flex justify-between items-center text-xs font-bold font-display uppercase tracking-wider">
                    <span className="text-slate-700">{label}</span>
                    <span className={`text-emerald-600`}>{value}</span>
                </div>
                <div className="h-2 rounded-full bg-slate-100 overflow-hidden">
                    <div style={{ width: `${progress}%` }} className={`h-full ${color}`}></div>
                </div>
            </div>
        );

        const TableRow = ({ matiere, type, typeColor, note, coef, moy, date, app }) => (
            <tr className="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
                <td className="px-6 py-5 text-slate-800 font-bold">{matiere}</td>
                <td className="px-6 py-5"><span className={`px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-widest ${typeColor}`}>{type}</span></td>
                <td className="px-6 py-5"><span className="text-lg font-bold text-emerald-600">{note}</span></td>
                <td className="px-6 py-5 font-bold text-slate-400">{coef}</td>
                <td className="px-6 py-5 font-bold text-slate-400">{moy}</td>
                <td className="px-6 py-5 font-bold text-slate-400">{date}</td>
                <td className="px-6 py-5 text-slate-500 text-xs italic">{app}</td>
            </tr>
        );

        const EventListCard = ({ day, month, title, time, type, color }) => {
            const colors = {
                blue: 'bg-blue-50 border-blue-500 text-blue-500 badge-bg-blue-500',
                amber: 'bg-amber-50 border-amber-400 text-amber-500 badge-bg-amber-400',
                rose: 'bg-rose-50 border-rose-400 text-rose-500 badge-bg-rose-500',
                emerald: 'bg-emerald-50 border-emerald-400 text-emerald-500 badge-bg-emerald-500'
            };
            const c = colors[color];
            return (
                <div className={`flex items-center gap-6 p-4 ${c.split(' ')[0]} rounded-2xl border-l-4 ${c.split(' ')[1]} shadow-sm border border-slate-100/20`}>
                    <div className="flex flex-col items-center justify-center w-12 border-r border-slate-100 pr-6">
                        <span className="text-2xl font-bold text-slate-800 leading-none">{day}</span>
                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{month}</span>
                    </div>
                    <div className="flex-1 min-w-0">
                        <h4 className="text-base font-bold text-slate-800 truncate mb-1">{title}</h4>
                        <p className="text-xs text-slate-500 font-medium">{time}</p>
                    </div>
                    <div className={`px-4 py-1.5 rounded-full text-[10px] font-bold text-white uppercase tracking-widest bg-${color}-500 shadow-sm`}>{type}</div>
                </div>
            );
        };

        const Tag = ({ label, color }) => (
            <button className="px-5 py-2 bg-white border border-slate-200 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-50 flex items-center gap-2">
                <div className={`w-2 h-2 rounded-full bg-${color}-500`}></div> {label}
            </button>
        );

        const DayHeader = ({ day, month }) => (
            <th className="p-4 border-b border-r border-slate-100 last:border-r-0 text-center">
                <div className="text-lg font-bold text-slate-800">{day}</div>
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{month}</div>
            </th>
        );

        const PlanningCard = ({ color, title, time, loc, striped, isFull, isSmall }) => (
            <div className={`rounded-xl p-4 text-white shadow-sm h-full flex flex-col justify-between ${color} ${striped?'bg-striped':''} ${isFull?'min-h-[250px]':''} ${isSmall?'py-2':''}`}>
                <h4 className={`font-bold ${isSmall?'text-xs':'text-sm'}`}>{title}</h4>
                {!isSmall && <div className="mt-4"><p className="text-[10px] opacity-90">{time}</p>{loc && <p className="text-[10px] opacity-90">{loc}</p>}</div>}
            </div>
        );

        const KpiCard = ({ color, icon, value, label, trend }) => (
            <div className={`bg-gradient-to-br ${color} rounded-2xl p-5 text-white shadow-md relative overflow-hidden`}>
                <div className="absolute top-4 right-4 w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center">{icon}</div>
                <div className="mt-4"><div className="text-3xl font-bold mb-1 tracking-tight">{value}</div><div className="text-sm font-medium text-white/90 mb-2">{label}</div><div className="text-xs text-white/70">{trend}</div></div>
            </div>
        );

        const ProgressionStat = ({ color, value, label }) => (
            <div className={`${color} rounded-2xl p-4 flex flex-col items-center justify-center text-center shadow-sm border border-slate-100/10`}>
                <div className="text-xl font-bold mb-1">{value}</div><div className="text-[10px] font-bold uppercase tracking-widest opacity-60 leading-tight">{label}</div>
            </div>
        );

        const UrgentAction = ({ icon, title, desc, deadline, btnLabel, color }) => {
            const bgClass = color === 'amber' ? 'bg-amber-50/80 border-amber-100/50' : 'bg-blue-50/80 border-blue-100/50';
            const iconBg = color === 'amber' ? 'bg-amber-400' : 'bg-blue-500';
            const btnBg = color === 'amber' ? 'bg-amber-500 hover:bg-amber-600' : 'bg-blue-500 hover:bg-blue-600';
            return (
                <div className={`${bgClass} rounded-xl p-4 border`}><div className="flex items-start gap-4 mb-4"><div className={`w-10 h-10 rounded-lg ${iconBg} flex items-center justify-center text-white shrink-0 shadow-sm`}>{icon}</div><div><h3 className="font-semibold text-slate-800 text-sm">{title}</h3><p className="text-sm text-slate-500 mt-0.5">{desc}</p></div></div><div className="flex items-center justify-between"><div className="flex items-center gap-1.5 text-xs font-bold bg-white px-2 py-1 rounded-md border border-slate-100 text-slate-400"><Clock size={12}/> {deadline}</div><button className={`${btnBg} text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow-md transition-all`}>{btnLabel}</button></div></div>
            );
        };

        const NotificationItem = ({ color, icon, title, desc, time }) => (
            <div className="flex items-start bg-white border border-slate-100 rounded-xl overflow-hidden shadow-sm"><div className={`w-1 ${color.split(' ')[0]} h-full self-stretch shrink-0`}></div><div className="p-3 pl-4 flex gap-4 w-full"><div className={`w-8 h-8 rounded-lg flex items-center justify-center mt-0.5 ${color.split(' ')[1]} ${color.split(' ')[2]}`}>{icon}</div><div className="flex-1 min-w-0"><h4 className="text-sm font-semibold text-slate-800 mb-0.5">{title}</h4><div className="text-xs text-slate-500 mb-1.5">{desc}</div><div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{time}</div></div></div></div>
        );

        const NavItem = ({ icon, label, hasDropdown }) => (
            <button className="flex items-center justify-between w-full px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-800/50 rounded-lg transition-colors group"><div className="flex items-center gap-3"><span className="group-hover:text-white transition-colors">{icon}</span><span className="font-medium text-sm">{label}</span></div>{hasDropdown && <ChevronDown size={14} className="opacity-50" />}</button>
        );

        const SubNavItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`flex items-center gap-3 w-full py-2 pl-8 pr-3 text-sm rounded-lg relative transition-all ${active ? 'text-white' : 'text-slate-400 hover:text-slate-200'}`}><span className={`absolute left-[-2px] w-1.5 h-1.5 rounded-full bg-brand-sidebar border-2 z-10 top-1/2 -translate-y-1/2 ${active ? 'border-blue-400' : 'border-slate-600'}`}></span><span className={active ? 'text-blue-400' : ''}>{icon}</span><span>{label}</span></button>
        );

        const TopNavButton = ({ icon, label, active }) => (
            <button className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium ${active ? 'bg-blue-500 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}>{icon} {label}</button>
        );

        const SecondaryNavBtn = ({ icon, label }) => (
            <button className="flex items-center gap-2 px-5 py-2.5 text-slate-500 hover:bg-slate-50 rounded-lg text-sm font-medium whitespace-nowrap">{icon} {label}</button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
