                                        <PlanningCard color="bg-emerald-500" icon={<Briefcase size={14} />} title="Entreprise" time="Journée complète" loc="Carrefour Clichy" isSmall />
                                    </td>
                                    <td className="p-2 border-b border-slate-100">
                                        <PlanningCard color="bg-orange-500" icon={<Monitor size={14} />} title="GRC - Relation client" time="9h00 - 12h00" loc="Salle 302" teacher="Mme Dubois" />
                                    </td>
                                </tr>
                                <tr>
                                    <td className="p-4 text-center border-r border-slate-100">
                                        <div className="text-sm font-bold text-slate-400">14h00</div>
                                        <div className="text-sm font-bold text-slate-400">17h00</div>
                                    </td>
                                    <td className="p-2 border-r border-slate-100">
                                        <PlanningCard color="bg-pink-500" icon={<Monitor size={14} />} title="Marketing digital" time="14h00 - 17h00" loc="Salle Info 2" teacher="M. Bernard" />
                                    </td>
                                    <td className="p-2 border-r border-slate-100">
                                        <PlanningCard color="bg-indigo-500" icon={<Monitor size={14} />} title="Culture générale" time="14h00 - 16h00" loc="Amphi A" teacher="M. Leroy" />
                                    </td>
                                    <td className="p-2 border-r border-slate-100">
                                        <div className="space-y-2">
                                            <PlanningCard color="bg-orange-500" icon={<Users size={14} />} title="Point pédagogique" time="14h00 - 14h30" loc="Bureau 105" teacher="Mme Dubois" isSmall />
                                            <PlanningCard color="bg-emerald-400/80" icon={<Briefcase size={14} />} title="Entreprise" time="" loc="" isSmall />
                                        </div>
                                    </td>
                                    <td className="p-2">
                                        <PlanningCard color="bg-teal-500" icon={<FileText size={14} />} title="Projet professionnel" time="14h00 - 17h00" loc="Salle 201" teacher="Mme Garcia" />
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </>
        );

        /* --- UI COMPONENTS --- */

        const EventListCard = ({ day, month, title, time, type, color }) => {
            const colors = {
                blue: { bg: 'bg-blue-50', border: 'border-blue-500', badge: 'bg-blue-500', text: 'text-blue-500' },
                amber: { bg: 'bg-amber-50', border: 'border-amber-400', badge: 'bg-amber-400', text: 'text-amber-500' },
                rose: { bg: 'bg-rose-50', border: 'border-rose-400', badge: 'bg-rose-500', text: 'text-rose-500' },
                emerald: { bg: 'bg-emerald-50', border: 'border-emerald-400', badge: 'bg-emerald-500', text: 'text-emerald-500' }
            };
            const c = colors[color];
            return (
                <div className={`flex items-center gap-6 p-4 ${c.bg} rounded-2xl border-l-4 ${c.border} transition-all hover:translate-x-1 duration-300 shadow-sm border border-slate-100/20`}>
                    <div className="flex flex-col items-center justify-center w-12 shrink-0 border-r border-slate-100 pr-6">
                        <span className="text-2xl font-bold text-slate-800 leading-none">{day}</span>
                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{month}</span>
                    </div>
                    <div className="flex-1 min-w-0">
                        <h4 className="text-base font-bold text-slate-800 truncate mb-1">{title}</h4>
                        <p className="text-xs text-slate-500 font-medium">{time}</p>
                    </div>
                    <div className={`px-4 py-1.5 rounded-full text-[10px] font-bold text-white uppercase tracking-widest shadow-sm ${c.badge}`}>{type}</div>
                </div>
            );
        };

        const ProgressionStat = ({ color, value, label }) => (
            <div className={`${color} rounded-2xl p-4 flex flex-col items-center justify-center text-center shadow-sm border border-slate-100/10`}>
                <div className="text-xl font-bold mb-1 tracking-tight">{value}</div>
                <div className="text-[10px] font-bold uppercase tracking-widest opacity-60 leading-tight">{label}</div>
            </div>
        );

        const DayHeader = ({ day, month }) => (
            <th className="p-4 border-b border-r border-slate-100 last:border-r-0">
                <div className="text-lg font-bold text-slate-800">{day}</div>
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{month}</div>
            </th>
        );

        const PlanningCard = ({ color, icon, title, time, loc, teacher, striped, isFull, isSmall }) => (
            <div className={`rounded-xl p-4 text-white shadow-sm h-full flex flex-col justify-between ${color} ${striped ? 'bg-striped' : ''} ${isFull ? 'min-h-[280px]' : ''} ${isSmall ? 'py-3' : ''}`}>
                <div>
                    <div className="flex items-center gap-2 mb-1.5">
                        <span className="p-1.5 bg-white/20 rounded-lg backdrop-blur-sm">{icon}</span>
                        <h4 className={`font-bold leading-tight ${isSmall ? 'text-sm' : 'text-base'}`}>{title}</h4>
                    </div>
                    {time && <p className="text-[11px] opacity-90 font-medium">{time}</p>}
                </div>
                {(loc || teacher) && (
                    <div className="mt-4 space-y-1">
                        {loc && <div className="flex items-center gap-1.5 text-[11px] opacity-90"><MapPin size={10} /> {loc}</div>}
                        {teacher && <div className="flex items-center gap-1.5 text-[11px] opacity-90"><User size={10} /> {teacher}</div>}
                    </div>
                )}
            </div>
        );

        const NavItem = ({ icon, label, hasDropdown }) => (
            <button className="flex items-center justify-between w-full px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-800/50 rounded-lg transition-colors group">
                <div className="flex items-center gap-3">
                    <span className="group-hover:text-white transition-colors">{icon}</span>
                    <span className="font-medium text-sm">{label}</span>
                </div>
                {hasDropdown && <ChevronDown size={14} className="opacity-50" />}
            </button>
        );

        const SubNavItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`flex items-center gap-3 w-full py-2 pl-8 pr-3 text-sm rounded-lg relative transition-all ${active ? 'text-white' : 'text-slate-400 hover:text-slate-200'}`}>
                <span className={`absolute left-[-2px] w-1.5 h-1.5 rounded-full bg-brand-sidebar border-2 z-10 top-1/2 -translate-y-1/2 ${active ? 'border-blue-400' : 'border-slate-600'}`}></span>
                <span className={active ? 'text-blue-400' : ''}>{icon}</span>
                <span>{label}</span>
            </button>
        );

        const TopNavButton = ({ icon, label, active }) => (
            <button className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium ${active ? 'bg-blue-500 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}>{icon} {label}</button>
        );

        const SecondaryNavBtn = ({ icon, label }) => (
            <button className="flex items-center gap-2 px-5 py-2.5 text-slate-500 hover:bg-slate-50 rounded-lg text-sm font-medium whitespace-nowrap">{icon} {label}</button>
        );

        const KpiCard = ({ color, icon, value, label, trend }) => (
            <div className={`bg-gradient-to-br ${color} rounded-2xl p-5 text-white shadow-md relative overflow-hidden`}>
                <div className="absolute top-4 right-4 w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm">{icon}</div>
                <div className="mt-4">
                    <div className="text-3xl font-bold mb-1 tracking-tight">{value}</div>
                    <div className="text-sm font-medium text-white/90 mb-2">{label}</div>
                    <div className="text-xs text-white/70">{trend}</div>
                </div>
            </div>
        );

        const UrgentAction = ({ icon, title, desc, deadline, btnLabel, color }) => {
            const bgClass = color === 'amber' ? 'bg-amber-50/80 border-amber-100/50' : 'bg-blue-50/80 border-blue-100/50';
            const iconBg = color === 'amber' ? 'bg-amber-400 shadow-amber-200' : 'bg-blue-500 shadow-blue-200';
            const btnBg = color === 'amber' ? 'bg-amber-500 hover:bg-amber-600' : 'bg-blue-500 hover:bg-blue-600';
            return (
                <div className={`${bgClass} rounded-xl p-4 border`}>
                    <div className="flex items-start gap-4 mb-4">
                        <div className={`w-10 h-10 rounded-lg ${iconBg} flex items-center justify-center text-white shrink-0 shadow-sm`}>{icon}</div>
                        <div>
                            <h3 className="font-semibold text-slate-800 text-sm">{title}</h3>
                            <p className="text-sm text-slate-500 mt-0.5">{desc}</p>
                        </div>
                    </div>
                    <div className="flex items-center justify-between">
                        <div className="flex items-center gap-1.5 text-xs font-bold bg-white px-2 py-1 rounded-md border border-slate-100 text-slate-400">
                            <Clock size={12} /> {deadline.includes('min') ? 'Durée:' : 'Deadline:'} {deadline}
                        </div>
                        <button className={`${btnBg} text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow-md transition-all`}>{btnLabel}</button>
                    </div>
                </div>
            );
        };

        const NotificationItem = ({ color, icon, title, desc, time }) => (
            <div className="flex items-start bg-white border border-slate-100 rounded-xl overflow-hidden shadow-sm">
                <div className={`w-1 ${color.split(' ')[0]} h-full self-stretch shrink-0`}></div>
                <div className="p-3 pl-4 flex gap-4 w-full">
                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center mt-0.5 ${color.split(' ')[1]} ${color.split(' ')[2]}`}>{icon}</div>
                    <div className="flex-1 min-w-0">
                        <h4 className="text-sm font-semibold text-slate-800 mb-0.5">{title}</h4>
                        <div className="text-xs text-slate-500 mb-1.5">{desc}</div>
                        <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{time}</div>
                    </div>
                </div>
            </div>
        );

        const WeatherBadge = ({ emoji, label, value }) => (
            <div className="bg-white/10 backdrop-blur-md rounded-xl p-4 flex flex-col items-center justify-center min-w-[100px] border border-white/10 shadow-inner">
                <div className="text-4xl mb-1">{emoji}</div>
                <div className="text-sm font-semibold">{label}</div>
                <div className="text-xs text-purple-200">{value}</div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
